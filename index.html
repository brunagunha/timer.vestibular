<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contagem Regressiva Vestibular</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎓 Contagem Regressiva</h1>

<div class="card">

<label>Vestibular</label>

<input
type="text"
id="vestibular"
placeholder="Ex: ENEM">

<label>Curso de Interesse</label>

<input
type="text"
id="curso"
placeholder="Ex: Medicina">

<label>Data da Prova</label>

<input
type="datetime-local"
id="data">

<button onclick="iniciar()">

Pesquisar

</button>

</div>

<div class="resultado">

<h2 id="nomeVestibular">Nenhum vestibular selecionado</h2>

<p id="nomeCurso"></p>

</div>

<div class="contador">

<div class="box">
<span id="dias">0</span>
<p>Dias</p>
</div>

<div class="box">
<span id="horas">0</span>
<p>Horas</p>
</div>

<div class="box">
<span id="minutos">0</span>
<p>Minutos</p>
</div>

<div class="box">
<span id="segundos">0</span>
<p>Segundos</p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
