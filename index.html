<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vestibular Timer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    input {
      padding: 12px;
      width: 60%;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    button {
      padding: 12px 20px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #00c853;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #00b248;
    }

    .timer {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
    }

    .box {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      border-radius: 10px;
      width: 100px;
    }

    .box span {
      font-size: 32px;
      display: block;
      margin-bottom: 5px;
    }

    h1 {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1 id="titulo">🎓 Vestibular Timer</h1>
    <p id="descricao">Pesquise um vestibular para começar</p>

    <input type="text" id="vestibular" placeholder="Ex: enem, fuvest, unicamp">
    <br>
    <button onclick="iniciarPesquisa()">Pesquisar</button>

    <div class="timer">
      <div class="box">
        <span id="dias">0</span>
        Dias
      </div>

      <div class="box">
        <span id="horas">0</span>
        Horas
      </div>

      <div class="box">
        <span id="minutos">0</span>
        Minutos
      </div>

      <div class="box">
        <span id="segundos">0</span>
        Segundos
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
